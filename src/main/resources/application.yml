server:
  port: 8081

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  application:
    name: ai-platform-api

openstrata:
  service:
    port: 8081
  features:
    multitenancy:
      enabled: false
    billing:
      enabled: false
    security:
      enabled: false
    riskControl:
      enabled: true
  spi:
    auth:
      provider: keycloak
    multitenancy:
      provider: capsule
    cache:
      provider: redis

---
spring:
  config:
    activate:
      on-profile: prod
  autoconfigure:
    exclude:  # Reset exclusions — enable DataSource, JPA, Flyway
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/platform_api}
    username: ${DATABASE_USER:platform}
    password: ${DATABASE_PASSWORD:platform}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

openstrata:
  services:
    tool-registry:
      url: ${TOOL_REGISTRY_URL:http://localhost:8093}
    srs:
      url: ${SRS_URL:http://localhost:8083}
    eval:
      url: ${EVAL_URL:http://localhost:8000}
    provisioning:
      url: ${PROVISIONING_URL:http://localhost:8080}

server:
  port: 8081
